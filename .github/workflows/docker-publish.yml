name: fe-docker-publish

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: fe-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: write  # Required to delete cache

env:
  IMAGE_NAME: ghcr.io/hermanngeorge15/personalweb-fe

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Clear GitHub Actions cache if [rebuild] is in commit message
      - name: Clear build cache
        if: github.event_name == 'push' && contains(github.event.head_commit.message, '[rebuild]')
        run: |
          gh extension install actions/gh-actions-cache
          echo "Clearing all build caches..."
          gh actions-cache delete --all --confirm || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_KEYCLOAK_URL=${{ secrets.VITE_KEYCLOAK_URL }}
            VITE_KEYCLOAK_REALM=${{ secrets.VITE_KEYCLOAK_REALM }}
            VITE_KEYCLOAK_CLIENT_ID=${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}
            VITE_KEYCLOAK_CHECK_SSO=true
            VITE_RECAPTCHA_SITE_KEY=${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
            BUILD_DATE=${{ github.run_number }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF_NAME=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[rebuild]') }}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://jirihermann.com
    steps:
      - name: SSH redeploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 8m
          script: |
            set -e
            cd /opt/jiri-site
            docker compose pull frontend
            docker compose up -d --force-recreate frontend

            echo "Waiting for frontend to come up..."
            for attempt in 1 2 3 4 5 6; do
              sleep 5
              if docker compose ps frontend --status running | grep -q frontend; then
                echo "✅ Frontend container running (attempt ${attempt})"
                break
              fi
            done

            docker image prune -f

      - name: Public smoke test
        run: |
          for attempt in 1 2 3 4 5; do
            sleep 5
            code=$(curl -s -o /dev/null -w "%{http_code}" https://jirihermann.com/)
            if [ "$code" = "200" ]; then
              echo "✅ https://jirihermann.com/ returned 200"
              exit 0
            fi
            echo "Attempt ${attempt}: got HTTP ${code}"
          done
          echo "❌ Site did not return 200 after 25s"
          exit 1